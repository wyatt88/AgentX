apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentx-ingress-backend
  namespace: agentx
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: agentx
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:678299176754:certificate/947f1a68-4622-4fa1-94fa-c34d155fad07
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443},{"HTTP":80}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300,routing.http2.enabled=true
    alb.ingress.kubernetes.io/tags: Environment=production,Project=agentx
spec:
  ingressClassName: alb
  rules:
  - host: agentx.doublewen.cloud
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: agentx-backend
            port:
              number: 8000
      - path: /health
        pathType: Exact
        backend:
          service:
            name: agentx-backend
            port:
              number: 8000
